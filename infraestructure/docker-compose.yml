services:
  # =========================
  # EUREKA
  # =========================
  eureka:
    build:
      context: ../rental-vehicle
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_SERVER_URL: http://eureka:8761/eureka/

  # =========================
  # POSTGRES LOCAL (deshabilitado — se usa Neon vía .env)
  # Para reactivar: quita los # de abajo y usa: docker compose --profile local-postgres up -d
  # =========================
  # vehicle-db:
  #   profiles: ["local-postgres"]
  #   image: postgres:16
  #   container_name: vehicle-db
  #   environment:
  #     POSTGRES_DB: vehicle_db
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - ./docker/vehicle-db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # operation-db:
  #   profiles: ["local-postgres"]
  #   image: postgres:16
  #   container_name: operation-db
  #   environment:
  #     POSTGRES_DB: operation_db
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   ports:
  #     - "5434:5432"
  #   volumes:
  #     - ./docker/operation-db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # =========================
  # VEHICLE MICROSERVICE (Neon vía .env)
  # =========================
  vehicle:
    build:
      context: ../vehicle
    container_name: vehicle-service
    ports:
      - "8091:8091"
    env_file:
      - .env
    depends_on:
      - eureka
    environment:
      SPRING_DATASOURCE_URL: ${VEHICLE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${VEHICLE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${VEHICLE_DB_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: vehicle
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"

  # =========================
  # OPERATION MICROSERVICE (Neon vía .env)
  # =========================
  operation:
    build:
      context: ../operation
    container_name: operation-service
    ports:
      - "8092:8092"
    env_file:
      - .env
    depends_on:
      - vehicle
      - eureka
    environment:
      SPRING_DATASOURCE_URL: ${OPERATION_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${OPERATION_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${OPERATION_DB_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: operation
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"

  # =========================
  # GATEWAY
  # =========================
  gateway:
    build:
      context: ../gateway
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - vehicle
      - operation
      - eureka
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://unir-web-rental-service-frontend.vercel.app,http://localhost:5173}

# Producción: activar con SPRING_PROFILES_ACTIVE=prod en Railway

# CORS sin localhost (sobrescribir con CORS_ALLOWED_ORIGINS si hace falta)
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOriginPatterns=${CORS_ALLOWED_ORIGINS:https://unir-web-rental-service-frontend.vercel.app}

# Rutas API únicamente (sin proxy a OpenAPI/Swagger)
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/vehicle/**
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/operation/**

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

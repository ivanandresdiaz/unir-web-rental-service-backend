server.port=${PORT:8080}

spring.application.name=gateway

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
eureka.instance.prefer-ip-address=true

# CORS (frontend en Vercel u otro origen)
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://*.vercel.app}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# --- RUTA VEHICLE ---
spring.cloud.gateway.routes[0].id=vehicle-route
spring.cloud.gateway.routes[0].uri=lb://vehicle
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/vehicle/**, /v3/api-docs/vehicle/**

# --- RUTA OPERATION ---
spring.cloud.gateway.routes[1].id=operation-route
spring.cloud.gateway.routes[1].uri=lb://operation
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/operation/**, /v3/api-docs/operation/**

# --- CONFIGURACIÓN SWAGGER CENTRALIZADO ---
springdoc.swagger-ui.urls[0].name=Servicio Vehiculos
springdoc.swagger-ui.urls[0].url=/v3/api-docs/vehicle
springdoc.swagger-ui.urls[1].name=Servicio Operaciones
springdoc.swagger-ui.urls[1].url=/v3/api-docs/operation
server.port=8080

spring.application.name=gateway

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}

spring.cloud.gateway.server.webflux.routes[0].id=vehicle-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://vehicle
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/vehicle/**

spring.cloud.gateway.server.webflux.routes[1].id=operation-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://operation
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/operation/**

spring.cloud.gateway.routes[2].id=vehicle-service
spring.cloud.gateway.routes[2].uri=lb://vehicle-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/vehicle/**, /v3/api-docs/**, /swagger-ui/**
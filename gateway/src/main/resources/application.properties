server.port=${PORT:8080}

spring.application.name=gateway

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
eureka.instance.prefer-ip-address=true

# CORS abierto (solo ejercicio educativo; en producción restringir orígenes)
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=false
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].maxAge=3600

# --- RUTA VEHICLE ---
spring.cloud.gateway.server.webflux.routes[0].id=vehicle-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://vehicle
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/vehicle/**, /v3/api-docs/vehicle/**

# --- RUTA OPERATION ---
spring.cloud.gateway.server.webflux.routes[1].id=operation-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://operation
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/operation/**, /v3/api-docs/operation/**

# --- CONFIGURACIÓN SWAGGER CENTRALIZADO ---
springdoc.swagger-ui.urls[0].name=Servicio Vehiculos
springdoc.swagger-ui.urls[0].url=/v3/api-docs/vehicle
springdoc.swagger-ui.urls[1].name=Servicio Operaciones
springdoc.swagger-ui.urls[1].url=/v3/api-docs/operation
